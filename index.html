<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Saqlain | Futuristic Dev</title>

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #050505;
  color: white;
  overflow-x: hidden;
}

/* Animated Background */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: -1;
}

/* Navbar */
header {
  display: flex;
  justify-content: space-between;
  padding: 20px 30px;
}

.logo {
  color: #00ffc3;
  font-weight: bold;
}

nav a {
  margin-left: 20px;
  text-decoration: none;
  color: white;
}

nav a:hover {
  color: #00ffc3;
}

/* Hero */
.hero {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
}

.hero h1 {
  font-size: 45px;
}

.glow {
  color: #00ffc3;
  text-shadow: 0 0 10px #00ffc3, 0 0 20px #00ffc3;
}

.typing {
  border-right: 2px solid #00ffc3;
  padding-right: 5px;
}

/* Button */
.btn {
  margin-top: 20px;
  padding: 12px 30px;
  border: 1px solid #00ffc3;
  background: transparent;
  color: #00ffc3;
  cursor: pointer;
}

.btn:hover {
  background: #00ffc3;
  color: black;
}

/* Sections */
.section {
  padding: 60px 20px;
  text-align: center;
}

/* Cards */
.cards {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 20px;
}

.card {
  background: #0f0f0f;
  padding: 20px;
  width: 260px;
  border-radius: 10px;
  border: 1px solid #00ffc355;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-10px) scale(1.05);
  box-shadow: 0 0 20px #00ffc3;
}

/* Footer */
footer {
  text-align: center;
  padding: 20px;
  border-top: 1px solid #222;
}
</style>

</head>

<body>

<canvas id="bg"></canvas>

<header>
  <div class="logo">Saqlain.dev</div>
  <nav>
    <a href="#">Home</a>
    <a href="#projects">Projects</a>
  </nav>
</header>

<section class="hero">
  <h1>Hi, I'm <span class="glow">Saqlain</span></h1>
  <h2 class="typing"></h2>
  <button class="btn" onclick="scrollToProjects()">Explore</button>
</section>

<section id="projects" class="section">
  <h2 class="glow">Projects</h2>
  <div class="cards">
    <div class="card">🚀 VPN App (React Native + Flask)</div>
    <div class="card">📱 Task Tracker App</div>
    <div class="card">🤖 Sign Language AI</div>
    <div class="card">🍔 HomeCook Web</div>
  </div>
</section>

<footer>
  © 2026 Saqlain.dev
</footer>

<script>
/* Typing Effect */
const texts = [
  "Full Stack Developer",
  "Mobile App Developer",
  "AI Enthusiast"
];

let i = 0, j = 0, current = "", isDeleting = false;
const el = document.querySelector(".typing");

function type() {
  current = texts[i];
  
  if (isDeleting) {
    el.textContent = current.substring(0, j--);
  } else {
    el.textContent = current.substring(0, j++);
  }

  if (!isDeleting && j === current.length) {
    isDeleting = true;
    setTimeout(type, 1000);
  } else if (isDeleting && j === 0) {
    isDeleting = false;
    i = (i + 1) % texts.length;
    setTimeout(type, 300);
  } else {
    setTimeout(type, isDeleting ? 50 : 100);
  }
}
type();

/* Scroll */
function scrollToProjects() {
  document.getElementById("projects").scrollIntoView({behavior: "smooth"});
}

/* Particle Background */
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for (let i = 0; i < 80; i++) {
  particles.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    size: Math.random() * 2,
    speedX: Math.random() - 0.5,
    speedY: Math.random() - 0.5
  });
}

function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  particles.forEach(p => {
    p.x += p.speedX;
    p.y += p.speedY;

    ctx.fillStyle = "#00ffc3";
    ctx.fillRect(p.x, p.y, p.size, p.size);

    if (p.x < 0 || p.x > canvas.width) p.speedX *= -1;
    if (p.y < 0 || p.y > canvas.height) p.speedY *= -1;
  });

  requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
